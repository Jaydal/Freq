name: Kiosk Terminal

on:
  push:
    branches: [main]
    paths: ["kiosk-terminal/**"]
  pull_request:
    branches: [main]
    paths: ["kiosk-terminal/**"]

defaults:
  run:
    working-directory: kiosk-terminal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libmosquitto-dev
      - run: cmake -B build -S .
      - run: cmake --build build -j
