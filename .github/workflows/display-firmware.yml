name: Display Firmware

on:
  push:
    branches: [main]
    paths: ["display-firmware/**"]
  pull_request:
    branches: [main]
    paths: ["display-firmware/**"]

defaults:
  run:
    working-directory: display-firmware

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            display-firmware/.pio
          key: pio-display-${{ runner.os }}-${{ hashFiles('display-firmware/platformio.ini') }}
      - run: pip install platformio
      - run: pio run -e esp32-hub75-wf2
