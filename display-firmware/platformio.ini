; PlatformIO Project Configuration File
;
; Huidu HD-WF2 (ESP32-S2) firmware for the Freq court display system.
;
; This is a self-contained PlatformIO project for the HD-WF2 commercial LED
; controller. The WF2 is an ESP32-S2 board with a HUB75 connector — we flash
; our own MQTT-driven firmware onto it (no Huidu proprietary protocol needed).
;
; Drives 2× P10 RGB panels chained horizontally (32×16 each → 64×16 total).
; Renders identically to web/src/components/display/P10Display.tsx (horizontal).
;
; Pin map sourced from:
;   https://github.com/mrcodetastic/HD-WF1-WF2-LED-MatrixPanel-DMA
;   src/hd-wf2-esp32s2-config.h
;
; Flash: USB-A (host) → USB-C (WF2 programming port).  75EX1 connector only.
;
; ─── Shared settings ──────────────────────────────────────────────────────────
[env]
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ─── Huidu HD-WF2 (ESP32-S3, 2× P10 RGB horizontal, MQTTS) ───────────────────
[env:esp32-hub75-wf2]
platform        = espressif32
board           = wifiduino32s3
upload_protocol = esptool
upload_speed    = 921600
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.0
    adafruit/Adafruit GFX Library@^1.11.0
    knolleary/PubSubClient@^2.8.0
    bblanchon/ArduinoJson@^7.0.0
board_build.partitions = default.csv
board_upload.flash_size = 4MB
board_build.flash_mode = dio
build_flags =
    -D USE_HUB75
    -D HD_WF2
    -D CORE_DEBUG_LEVEL=1
build_type = release