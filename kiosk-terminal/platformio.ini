; PlatformIO build for the Waveshare ESP32-S3-Touch-LCD-7B
;
; The simulator CMake build (CMakeLists.txt) remains untouched and lives
; alongside this file — `pio run` uses this, `cmake` uses the CMakeLists.
;
; Build & flash:
;   pio run -e waveshare-7b
;   pio run -e waveshare-7b -t upload
;   pio run -e waveshare-7b -t monitor

[env:waveshare-7b]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; ── Flash / PSRAM ────────────────────────────────────────────────────────────
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB

; ── Source filter: exclude simulator HAL, include everything else ───────────
build_src_filter =
    +<*>
    -<hal_sim/>
    -<main.c>

; ── Build flags ─────────────────────────────────────────────────────────────
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_HAS_PSRAM
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/src

; ── Upload / Monitor ────────────────────────────────────────────────────────
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
